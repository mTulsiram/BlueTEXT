<h1>Playground</h1>
<div class="tool-container">
    <div class="row">
        <div class="col">
            <label for="html-input">HTML</label>
            <textarea id="html-input" rows="5"></textarea>

            <label for="css-input">CSS</label>
            <textarea id="css-input" rows="5"></textarea>

            <label for="js-input">JS</label>
            <textarea id="js-input" rows="5"></textarea>

            <button>Run</button>
        </div>
        <div class="col">
            <label>Output</label>
            <iframe id="playground-output"></iframe>
        </div>
    </div>
</div>
