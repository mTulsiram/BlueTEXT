<h1>Calculator</h1>

<div class="calculator">
    <input type="text" class="calc-display" id="calc-display" disabled value="0">
    <div class="calc-keys">
        <button class="clear">C</button>
        <button>(</button>
        <button>)</button>
        <button class="operator">/</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">*</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">+</button>

        <button>0</button>
        <button>.</button>
        <button class="equals">=</button>
    </div>
</div>
