<main class="container">
    <div class="tool-header">
        <h1>Calculator</h1>
        <p class="lead">A simple, vanilla JavaScript calculator.</p>
    </div>
    <div class="calculator-wrapper">
        <div class="calculator">
            <div class="calc-display" id="calc-display">0</div>
            <div class="calc-buttons">
                <button class="calc-btn btn-clear" data-action="clear">C</button>
                <button class="calc-btn btn-operator" data-action="negate">+/-</button>
                <button class="calc-btn btn-operator" data-action="percent">%</button>
                <button class="calc-btn btn-operator" data-action="divide">÷</button>

                <button class="calc-btn" data-number="7">7</button>
                <button class="calc-btn" data-number="8">8</button>
                <button class="calc-btn" data-number="9">9</button>
                <button class="calc-btn btn-operator" data-action="multiply">×</button>

                <button class="calc-btn" data-number="4">4</button>
                <button class="calc-btn" data-number="5">5</button>
                <button class="calc-btn" data-number="6">6</button>
                <button class="calc-btn btn-operator" data-action="subtract">-</button>

                <button class="calc-btn" data-number="1">1</button>
                <button class="calc-btn" data-number="2">2</button>
                <button class="calc-btn" data-number="3">3</button>
                <button class="calc-btn btn-operator" data-action="add">+</button>

                <button class="calc-btn btn-zero" data-number="0">0</button>
                <button class="calc-btn" data-action="decimal">.</button>
                <button class="calc-btn btn-equals" data-action="calculate">=</button>
            </div>
        </div>
    </div>
</main>
