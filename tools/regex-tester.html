<h1>Regex Tester</h1>
<div class="tool-container">
    <div class="row">
        <div class="col" style="flex: 1 1 300px;">
            <label for="regex-pattern" style="display:block;margin-bottom:.5rem;font-weight:bold;">Regular Expression</label>
            <div style="display:flex; align-items:center; margin-bottom: 1rem; border:1px solid #ccc; border-radius:4px; padding:0 .5rem;">
                <span style="font-family:monospace; color:#666;">/</span>
                <input type="text" id="regex-pattern" style="flex:1; padding:.5rem; border:none; font-family:monospace; outline:none;" placeholder="[A-Z][a-z]+">
                <span style="font-family:monospace; color:#666;">/</span>
                <input type="text" id="regex-flags" style="width:40px; padding:.5rem; border:none; border-left:1px solid #ccc; font-family:monospace; outline:none;" placeholder="g" value="g">
            </div>

            <label for="regex-test-string" style="display:block;margin-bottom:.5rem;font-weight:bold;">Test String</label>
            <textarea id="regex-test-string" rows="10" style="width:100%;padding:.5rem;border:1px solid #ccc;border-radius:4px;font-family:monospace;" placeholder="Enter string to test regex against..."></textarea>

            <p id="regex-error" style="color:#ff4d4d; margin-top:1rem; display:none;"></p>
        </div>
        <div class="col" style="flex: 1 1 300px;">
            <label style="display:block;margin-bottom:.5rem;font-weight:bold;">Match Result</label>
            <div id="regex-result" style="width:100%; height:calc(100% - 1.5rem); min-height:200px; padding:1rem; border:1px solid #ccc; border-radius:4px; background:#f5f5f5; overflow:auto; white-space:pre-wrap; margin:0; font-family:monospace; line-height:1.5;"></div>
        </div>
    </div>
</div>

<script>
    function testRegex() {
        const patternInput = document.getElementById('regex-pattern').value;
        const flagsInput = document.getElementById('regex-flags').value;
        const testString = document.getElementById('regex-test-string').value;
        const resultDiv = document.getElementById('regex-result');
        const errorMsg = document.getElementById('regex-error');

        resultDiv.innerHTML = '';
        errorMsg.style.display = 'none';

        if (!patternInput) {
            resultDiv.textContent = testString;
            return;
        }

        try {
            const regex = new RegExp(patternInput, flagsInput);

            // Highlight matches securely using DOM manipulation (no innerHTML assignment with user data)
            let lastIndex = 0;
            let match;

            // To prevent infinite loops with zero-length matches (like /.*/g or /^/g), add safeguard
            if(regex.global && patternInput === '') {
                resultDiv.textContent = testString;
                return;
            }

            while ((match = regex.exec(testString)) !== null) {
                // Add text before match
                if (match.index > lastIndex) {
                    resultDiv.appendChild(document.createTextNode(testString.substring(lastIndex, match.index)));
                }

                // Add match highlighted
                const mark = document.createElement('mark');
                mark.style.backgroundColor = '#ffd700';
                mark.style.borderRadius = '2px';
                mark.style.padding = '0 2px';
                mark.textContent = match[0];
                resultDiv.appendChild(mark);

                lastIndex = regex.lastIndex;

                if (!regex.global) break; // Break if not global flag
                if (match[0].length === 0) regex.lastIndex++; // Prevent infinite loop on zero-length matches
            }

            // Add remaining text
            if (lastIndex < testString.length) {
                resultDiv.appendChild(document.createTextNode(testString.substring(lastIndex)));
            }

        } catch (e) {
            errorMsg.textContent = 'Invalid Regular Expression: ' + e.message;
            errorMsg.style.display = 'block';
            resultDiv.textContent = testString;
        }
    }

    document.getElementById('regex-pattern').addEventListener('input', testRegex);
    document.getElementById('regex-flags').addEventListener('input', testRegex);
    document.getElementById('regex-test-string').addEventListener('input', testRegex);

    // Initial placeholder
    document.getElementById('regex-pattern').value = '\\b[A-Za-z]+\\b';
    document.getElementById('regex-test-string').value = 'The quick brown fox jumps over the lazy dog. 12345!';
    testRegex();
</script>
