<h1>Regex Tester</h1>
<div class="tool-container">
    <div class="row">
        <div class="col">
            <label for="regex-pattern">Regular Expression</label>
            <div>
                <span>/</span>
                <input type="text" id="regex-pattern" placeholder="[A-Z][a-z]+">
                <span>/</span>
                <input type="text" id="regex-flags" placeholder="g" value="g">
            </div>

            <label for="regex-test-string">Test String</label>
            <textarea id="regex-test-string" rows="10" placeholder="Enter string to test regex against..."></textarea>

            <p id="regex-error"></p>
        </div>
        <div class="col">
            <label>Match Result</label>
            <div id="regex-result"></div>
        </div>
    </div>
</div>
