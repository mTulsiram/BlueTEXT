<h1>JSON Formatter</h1>
<div class="tool-container">
    <div class="row">
        <div class="col" style="flex: 1 1 300px;">
            <label for="json-input" style="display:block;margin-bottom:.5rem;font-weight:bold;">Input JSON</label>
            <textarea id="json-input" rows="15" style="width:100%;padding:.5rem;border:1px solid #ccc;border-radius:4px;font-family:monospace;" placeholder='{"key": "value"}'></textarea>
            <div style="margin-top: 1rem;">
                <button id="format-btn" style="padding:.5rem 1rem; background:var(--accent); color:white; border:none; border-radius:4px; cursor:pointer; margin-right: .5rem;">Format</button>
                <button id="minify-btn" style="padding:.5rem 1rem; background:#666; color:white; border:none; border-radius:4px; cursor:pointer; margin-right: .5rem;">Minify</button>
                <button id="clear-btn" style="padding:.5rem 1rem; background:#ff4d4d; color:white; border:none; border-radius:4px; cursor:pointer;">Clear</button>
            </div>
            <p id="json-error" style="color:#ff4d4d; margin-top:1rem; display:none;"></p>
        </div>
        <div class="col" style="flex: 1 1 300px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:.5rem;">
                <label style="font-weight:bold;">Output</label>
                <button id="copy-json-btn" style="padding:.5rem 1rem; background:var(--accent); color:white; border:none; border-radius:4px; cursor:pointer;">Copy</button>
            </div>
            <pre id="json-output" style="width:100%; height:calc(100% - 3rem); min-height:300px; padding:1rem; border:1px solid #ccc; border-radius:4px; background:#f5f5f5; overflow:auto; white-space:pre-wrap; margin:0; font-family:monospace;"></pre>
        </div>
    </div>
</div>

<script>
(function(){
    const input = document.getElementById('json-input');
    const output = document.getElementById('json-output');
    const formatBtn = document.getElementById('format-btn');
    const minifyBtn = document.getElementById('minify-btn');
    const clearBtn = document.getElementById('clear-btn');
    const copyBtn = document.getElementById('copy-json-btn');
    const errorMsg = document.getElementById('json-error');

    function processJSON(minify) {
        errorMsg.style.display = 'none';
        const rawValue = input.value.trim();
        if (!rawValue) {
            output.textContent = '';
            return;
        }

        try {
            const parsed = JSON.parse(rawValue);
            output.textContent = minify ? JSON.stringify(parsed) : JSON.stringify(parsed, null, 4);
        } catch (e) {
            errorMsg.textContent = 'Invalid JSON: ' + e.message;
            errorMsg.style.display = 'block';
        }
    }

    formatBtn.addEventListener('click', () => processJSON(false));
    minifyBtn.addEventListener('click', () => processJSON(true));

    clearBtn.addEventListener('click', () => {
        input.value = '';
        output.textContent = '';
        errorMsg.style.display = 'none';
    });

    copyBtn.addEventListener('click', () => {
        if (!output.textContent) return;
        navigator.clipboard.writeText(output.textContent).then(() => {
            const originalText = copyBtn.textContent;
            copyBtn.textContent = 'Copied!';
            setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
        });
    });
})();
</script>
