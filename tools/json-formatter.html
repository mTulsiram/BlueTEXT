<h1>JSON Formatter</h1>
<div class="tool-container">
    <div class="row">
        <div class="col">
            <label for="json-input">Input JSON</label>
            <textarea id="json-input" rows="15" placeholder='{"key": "value"}'></textarea>
            <div>
                <button id="format-btn">Format</button>
                <button id="minify-btn">Minify</button>
                <button id="clear-btn">Clear</button>
            </div>
            <p id="json-error"></p>
        </div>
        <div class="col">
            <div>
                <label>Output</label>
                <button id="copy-json-btn">Copy</button>
            </div>
            <pre id="json-output"></pre>
        </div>
    </div>
</div>
