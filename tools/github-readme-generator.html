<h1>GitHub README Generator</h1>
<div class="tool-container">
    <div class="row">
        <div class="col">
            <form id="readme-form">
                <div>
                    <label for="project-title">Project Title</label>
                    <input type="text" id="project-title" placeholder="e.g. My Awesome Project">
                </div>
                <div>
                    <label for="project-description">Description</label>
                    <textarea id="project-description" rows="3" placeholder="A brief description of what this project does and who it's for"></textarea>
                </div>
                <div>
                    <label for="project-installation">Installation</label>
                    <textarea id="project-installation" rows="3" placeholder="npm install my-project"></textarea>
                </div>
                <div>
                    <label for="project-usage">Usage</label>
                    <textarea id="project-usage" rows="3" placeholder="import myProject from 'my-project'"></textarea>
                </div>
            </form>
        </div>
        <div class="col">
            <div>
                <label>Preview</label>
                <button id="copy-btn">Copy</button>
            </div>
            <pre id="readme-preview"></pre>
        </div>
    </div>
</div>
