<h1>Color Picker</h1>
<div class="tool-container" style="max-width: 500px; margin: 0 auto; padding: 2rem; background: #fff; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center;">

    <label for="color-input" style="display:block;margin-bottom:1rem;font-size:1.2rem;font-weight:bold;">Select a Color</label>

    <div style="display:flex; justify-content:center; margin-bottom: 2rem;">
        <input type="color" id="color-input" value="#0a74da" style="width: 150px; height: 150px; padding: 0; border: none; border-radius: 50%; cursor: crosshair; background: none; -webkit-appearance: none; appearance: none;">
    </div>

    <div style="background: #f9f9f9; padding: 1rem; border-radius: 8px; text-align: left;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; align-items: center;">
            <strong style="width: 50px;">HEX</strong>
            <input type="text" id="hex-output" readonly style="flex:1; padding:.5rem; margin:0 1rem; border:1px solid #ddd; border-radius:4px; font-family:monospace;">
            <button onclick="copyColor('hex')" style="padding:.5rem 1rem; background:var(--accent); color:white; border:none; border-radius:4px; cursor:pointer;">Copy</button>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; align-items: center;">
            <strong style="width: 50px;">RGB</strong>
            <input type="text" id="rgb-output" readonly style="flex:1; padding:.5rem; margin:0 1rem; border:1px solid #ddd; border-radius:4px; font-family:monospace;">
            <button onclick="copyColor('rgb')" style="padding:.5rem 1rem; background:var(--accent); color:white; border:none; border-radius:4px; cursor:pointer;">Copy</button>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <strong style="width: 50px;">HSL</strong>
            <input type="text" id="hsl-output" readonly style="flex:1; padding:.5rem; margin:0 1rem; border:1px solid #ddd; border-radius:4px; font-family:monospace;">
            <button onclick="copyColor('hsl')" style="padding:.5rem 1rem; background:var(--accent); color:white; border:none; border-radius:4px; cursor:pointer;">Copy</button>
        </div>
    </div>
</div>

<script>
    const colorInput = document.getElementById('color-input');
    const hexOutput = document.getElementById('hex-output');
    const rgbOutput = document.getElementById('rgb-output');
    const hslOutput = document.getElementById('hsl-output');

    function hexToRgb(hex) {
        let r = parseInt(hex.slice(1, 3), 16),
            g = parseInt(hex.slice(3, 5), 16),
            b = parseInt(hex.slice(5, 7), 16);
        return {r, g, b};
    }

    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        let max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;

        if(max === min) {
            h = s = 0; // achromatic
        } else {
            let d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch(max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return `hsl(${Math.round(h * 360)}, ${Math.round(s * 100)}%, ${Math.round(l * 100)}%)`;
    }

    function updateColors() {
        const hex = colorInput.value;
        const rgb = hexToRgb(hex);

        hexOutput.value = hex.toUpperCase();
        rgbOutput.value = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
        hslOutput.value = rgbToHsl(rgb.r, rgb.g, rgb.b);
    }

    window.copyColor = function(type) {
        const input = document.getElementById(type + '-output');
        const btn = event.target;
        if (!input.value) return;
        navigator.clipboard.writeText(input.value).then(() => {
            const original = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = original; }, 2000);
        });
    }

    colorInput.addEventListener('input', updateColors);

    // Initial color
    updateColors();
</script>
