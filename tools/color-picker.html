<h1>Color Picker</h1>
<div class="tool-container">

    <label for="color-input">Select a Color</label>

    <div>
        <input type="color" id="color-input" value="#0a74da">
    </div>

    <div>
        <div>
            <strong>HEX</strong>
            <input type="text" id="hex-output" readonly>
            <button>Copy</button>
        </div>

        <div>
            <strong>RGB</strong>
            <input type="text" id="rgb-output" readonly>
            <button>Copy</button>
        </div>

        <div>
            <strong>HSL</strong>
            <input type="text" id="hsl-output" readonly>
            <button>Copy</button>
        </div>
    </div>
</div>
