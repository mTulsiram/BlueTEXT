<h1>Markdown Editor</h1>
<div class="tool-container">
    <div class="row">
        <div class="col" style="flex: 1 1 300px;">
            <label for="md-input" style="display:block;margin-bottom:.5rem;font-weight:bold;">Markdown Input</label>
            <textarea id="md-input" rows="20" style="width:100%;padding:.5rem;border:1px solid #ccc;border-radius:4px;font-family:monospace;resize:vertical;" placeholder="# Hello World\n\nStart typing markdown here..."></textarea>
        </div>
        <div class="col" style="flex: 1 1 300px;">
            <label style="display:block;margin-bottom:.5rem;font-weight:bold;">HTML Output Preview</label>
            <div id="md-preview" style="width:100%; height:calc(100% - 1.5rem); min-height:400px; padding:1rem; border:1px solid #ccc; border-radius:4px; background:#fff; overflow:auto; word-wrap:break-word;"></div>
        </div>
    </div>
</div>

<script>
(function(){
    const input = document.getElementById('md-input');
    const preview = document.getElementById('md-preview');

    function parseMarkdown(mdText) {
        if (!mdText) return '';

        // Escape HTML to prevent XSS
        let html = mdText
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');

        // Basic Markdown to HTML parsing logic (simplified)
        html = html
            // Headers
            .replace(/^### (.*$)/gim, '<h3>$1</h3>')
            .replace(/^## (.*$)/gim, '<h2>$1</h2>')
            .replace(/^# (.*$)/gim, '<h1>$1</h1>')
            // Bold
            .replace(/\*\*(.*)\*\*/gim, '<b>$1</b>')
            // Italic
            .replace(/\*(.*)\*/gim, '<i>$1</i>')
            // Links
            .replace(/\[(.*?)\]\((.*?)\)/gim, "<a href='$2'>$1</a>")
            // Lists (ul)
            .replace(/^\s*\n\*/gm, '<ul>\n*')
            .replace(/^(\*.+)\s*\n([^\*])/gm, '$1\n</ul>\n\n$2')
            .replace(/^\*(.+)/gm, '<li>$1</li>')
            // Newlines to <br>
            .replace(/\n$/gim, '<br />');

        // Wrapping paragraphs
        html = html.split('\n\n').map(p => {
            p = p.trim();
            if(p && !p.match(/^<h[1-6]>/) && !p.match(/^<ul/) && !p.match(/^<li/)){
                return `<p>${p}</p>`;
            }
            return p;
        }).join('\n');

        return html;
    }

    function updatePreview() {
        const markdownText = input.value;
        preview.innerHTML = parseMarkdown(markdownText);
    }

    input.addEventListener('input', updatePreview);

    // Initial parsing
    input.value = `# Markdown Editor\n\nEdit markdown on the left, see the preview on the right.\n\n* Bold: **bold text**\n* Italic: *italic text*\n* Links: [OpenAI](https://openai.com)\n\n### Enjoy!`;
    updatePreview();
})();
</script>
