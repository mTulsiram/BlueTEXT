<h1>Code Converter</h1>
<div class="tool-container">
    <div class="row">
        <div class="col">
            <label for="code-input">Input Text</label>
            <textarea id="code-input" rows="10"></textarea>
            <div>
                <button>UPPERCASE</button>
                <button>lowercase</button>
                <button>Title Case</button>
                <button>camelCase</button>
                <button>snake_case</button>
                <button>Clear</button>
            </div>
        </div>
        <div class="col">
            <div>
                <label>Output</label>
                <button id="copy-code-btn">Copy</button>
            </div>
            <pre id="code-output"></pre>
        </div>
    </div>
</div>
