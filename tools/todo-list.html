<h1>Todo List</h1>
<div class="tool-container" style="max-width: 500px; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">

    <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
        <input type="text" id="todo-input" style="flex: 1; padding: .75rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1.1rem;" placeholder="Add a new task...">
        <button onclick="addTodo()" style="padding: .75rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Add</button>
    </div>

    <ul id="todo-list" style="list-style: none; padding: 0; margin: 0;">
        <!-- Items will be generated here -->
    </ul>

    <div style="margin-top: 2rem; text-align: center; color: #888; font-size: 0.9rem;">
        Tasks are saved automatically to your browser.
    </div>
</div>

<script>
    const input = document.getElementById('todo-input');
    const list = document.getElementById('todo-list');

    let todos = JSON.parse(localStorage.getItem('bluetext-todos')) || [];

    function renderTodos() {
        list.innerHTML = '';
        todos.forEach((todo, index) => {
            const li = document.createElement('li');
            li.style.display = 'flex';
            li.style.alignItems = 'center';
            li.style.justifyContent = 'space-between';
            li.style.padding = '1rem';
            li.style.borderBottom = '1px solid #eee';
            li.style.background = todo.completed ? '#f9f9f9' : '#fff';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = todo.completed;
            checkbox.style.marginRight = '1rem';
            checkbox.style.cursor = 'pointer';
            checkbox.style.transform = 'scale(1.5)';
            checkbox.onchange = () => toggleTodo(index);

            const span = document.createElement('span');
            span.textContent = todo.text;
            span.style.flex = '1';
            span.style.fontSize = '1.1rem';
            span.style.textDecoration = todo.completed ? 'line-through' : 'none';
            span.style.color = todo.completed ? '#888' : '#333';

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '✕';
            deleteBtn.style.background = 'transparent';
            deleteBtn.style.color = '#ff4d4d';
            deleteBtn.style.border = 'none';
            deleteBtn.style.fontSize = '1.2rem';
            deleteBtn.style.cursor = 'pointer';
            deleteBtn.onclick = () => deleteTodo(index);

            li.appendChild(checkbox);
            li.appendChild(span);
            li.appendChild(deleteBtn);
            list.appendChild(li);
        });
        saveTodos();
    }

    function saveTodos() {
        localStorage.setItem('bluetext-todos', JSON.stringify(todos));
    }

    window.addTodo = function() {
        const text = input.value.trim();
        if (text) {
            todos.push({ text: text, completed: false });
            input.value = '';
            renderTodos();
        }
    }

    window.toggleTodo = function(index) {
        todos[index].completed = !todos[index].completed;
        renderTodos();
    }

    window.deleteTodo = function(index) {
        todos.splice(index, 1);
        renderTodos();
    }

    // Add on Enter key
    input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            addTodo();
        }
    });

    // Initial render
    renderTodos();
</script>
