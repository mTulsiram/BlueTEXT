<h1>Timer</h1>
<div class="tool-container">

    <div id="timer-display">00:00</div>

    <div>
        <input type="number" id="minutes-input" min="0" max="60" value="5" placeholder="Min">
        <span>:</span>
        <input type="number" id="seconds-input" min="0" max="59" value="0" placeholder="Sec">
    </div>

    <div>
        <button id="start-btn">Start</button>
        <button>Reset</button>
    </div>
</div>
