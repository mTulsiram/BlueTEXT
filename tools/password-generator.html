<main class="container">
    <div class="tool-header">
        <h1>Password Generator</h1>
        <p class="lead">Generate strong, secure passwords instantly.</p>
    </div>

    <div class="pg-wrapper">
        <div class="pg-box">
            <div class="pg-result-container">
                <div class="pg-result" id="pg-result">P4$5W0rD!</div>
                <button class="pg-copy-btn" id="pg-copy-btn" aria-label="Copy to clipboard">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
            </div>

            <div class="pg-controls">
                <div class="pg-length-control">
                    <label for="pg-length">Password Length: <span id="pg-length-val">16</span></label>
                    <input type="range" id="pg-length" min="4" max="64" value="16">
                </div>

                <div class="pg-options">
                    <label class="pg-option">
                        <input type="checkbox" id="pg-upper" checked>
                        Uppercase (A-Z)
                    </label>
                    <label class="pg-option">
                        <input type="checkbox" id="pg-lower" checked>
                        Lowercase (a-z)
                    </label>
                    <label class="pg-option">
                        <input type="checkbox" id="pg-numbers" checked>
                        Numbers (0-9)
                    </label>
                    <label class="pg-option">
                        <input type="checkbox" id="pg-symbols" checked>
                        Symbols (!@#$%)
                    </label>
                </div>

                <button class="btn pg-generate-btn" id="pg-generate-btn">Generate Password</button>
            </div>
        </div>
    </div>
</main>
