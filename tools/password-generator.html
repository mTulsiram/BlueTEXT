<h1>Password Generator</h1>
<div class="tool-container" style="max-width: 500px; margin: 0 auto; padding: 1.5rem; background: #fff; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <div style="margin-bottom: 1.5rem;">
        <label for="password-output" style="display:block;margin-bottom:.5rem;font-weight:bold;">Generated Password</label>
        <div style="display:flex;">
            <input type="text" id="password-output" readonly style="flex:1;padding:.75rem;border:1px solid #ccc;border-radius:4px 0 0 4px;font-family:monospace;font-size:1.2rem;background:#f9f9f9;">
            <button id="copy-pwd-btn" style="padding:.75rem 1.5rem; background:var(--accent); color:white; border:none; border-radius:0 4px 4px 0; cursor:pointer;">Copy</button>
        </div>
    </div>

    <div style="margin-bottom: 1rem;">
        <label for="pwd-length" style="display:block;margin-bottom:.5rem;font-weight:bold;">Password Length (<span id="pwd-length-val">16</span>)</label>
        <input type="range" id="pwd-length" min="4" max="64" value="16" style="width:100%; cursor:pointer;">
    </div>

    <div style="margin-bottom: 1.5rem;">
        <label style="display:block;margin-bottom:.5rem;font-weight:bold;">Options</label>
        <div style="display:flex; flex-direction:column; gap:.5rem;">
            <label style="cursor:pointer; display:flex; align-items:center; gap:.5rem;">
                <input type="checkbox" id="pwd-uppercase" checked> Include Uppercase (A-Z)
            </label>
            <label style="cursor:pointer; display:flex; align-items:center; gap:.5rem;">
                <input type="checkbox" id="pwd-lowercase" checked> Include Lowercase (a-z)
            </label>
            <label style="cursor:pointer; display:flex; align-items:center; gap:.5rem;">
                <input type="checkbox" id="pwd-numbers" checked> Include Numbers (0-9)
            </label>
            <label style="cursor:pointer; display:flex; align-items:center; gap:.5rem;">
                <input type="checkbox" id="pwd-symbols" checked> Include Symbols (!@#$%^&*)
            </label>
        </div>
    </div>

    <button id="generate-btn" style="width:100%; padding:1rem; background:var(--accent); color:white; border:none; border-radius:4px; font-size:1.1rem; cursor:pointer; font-weight:bold;">Generate Password</button>
</div>

<script>
(function(){
    const lengthInput = document.getElementById('pwd-length');
    const lengthVal = document.getElementById('pwd-length-val');
    const uppercaseCb = document.getElementById('pwd-uppercase');
    const lowercaseCb = document.getElementById('pwd-lowercase');
    const numbersCb = document.getElementById('pwd-numbers');
    const symbolsCb = document.getElementById('pwd-symbols');
    const generateBtn = document.getElementById('generate-btn');
    const outputInput = document.getElementById('password-output');
    const copyBtn = document.getElementById('copy-pwd-btn');

    const chars = {
        uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        lowercase: 'abcdefghijklmnopqrstuvwxyz',
        numbers: '0123456789',
        symbols: '!@#$%^&*()_+~`|}{[]:;?><,./-='
    };

    function generatePassword() {
        let charset = '';
        if (uppercaseCb.checked) charset += chars.uppercase;
        if (lowercaseCb.checked) charset += chars.lowercase;
        if (numbersCb.checked) charset += chars.numbers;
        if (symbolsCb.checked) charset += chars.symbols;

        if (!charset) {
            outputInput.value = 'Select at least one option';
            return;
        }

        const length = parseInt(lengthInput.value, 10);
        let password = '';
        const charsetLength = charset.length;

        for (let i = 0; i < length; i++) {
            const randomIndex = Math.floor(Math.random() * charsetLength);
            password += charset[randomIndex];
        }

        outputInput.value = password;
    }

    lengthInput.addEventListener('input', () => {
        lengthVal.textContent = lengthInput.value;
        generatePassword();
    });

    [uppercaseCb, lowercaseCb, numbersCb, symbolsCb].forEach(cb => {
        cb.addEventListener('change', generatePassword);
    });

    generateBtn.addEventListener('click', generatePassword);

    copyBtn.addEventListener('click', () => {
        if (!outputInput.value || outputInput.value === 'Select at least one option') return;
        navigator.clipboard.writeText(outputInput.value).then(() => {
            const originalText = copyBtn.textContent;
            copyBtn.textContent = 'Copied!';
            setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
        });
    });

    // Initial generation
    generatePassword();
})();
</script>
