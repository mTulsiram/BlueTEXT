<h1>Password Generator</h1>
<div class="tool-container">
    <div>
        <label for="password-output">Generated Password</label>
        <div>
            <input type="text" id="password-output" readonly>
            <button id="copy-pwd-btn">Copy</button>
        </div>
    </div>

    <div>
        <label for="pwd-length">Password Length (<span id="pwd-length-val">16</span>)</label>
        <input type="range" id="pwd-length" min="4" max="64" value="16">
    </div>

    <div>
        <label>Options</label>
        <div>
            <label>
                <input type="checkbox" id="pwd-uppercase" checked> Include Uppercase (A-Z)
            </label>
            <label>
                <input type="checkbox" id="pwd-lowercase" checked> Include Lowercase (a-z)
            </label>
            <label>
                <input type="checkbox" id="pwd-numbers" checked> Include Numbers (0-9)
            </label>
            <label>
                <input type="checkbox" id="pwd-symbols" checked> Include Symbols (!@#$%^&*)
            </label>
        </div>
    </div>

    <button id="generate-btn">Generate Password</button>
</div>
